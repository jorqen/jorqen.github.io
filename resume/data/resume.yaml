    heroStudio: &photo_hero_studio
      src: "assets/photos/matvey-studio.jpg"
      position: "center 18%"
      filter: "brightness(0.94) contrast(1.04) saturate(0.9)"
    stairs: &photo_stairs
      src: "assets/photos/matvey-stairs.jpg"
      position: "center 18%"
      filter: "brightness(0.8) contrast(1.03) saturate(0.88)"
    japan: &photo_japan
      src: "assets/photos/matvey-japan.jpg"
      filter: "brightness(1.06) contrast(1.03) saturate(0.92)"
    cafe: &photo_cafe
      src: "assets/photos/matvey-cafe.jpg"
      filter: "brightness(0.96) contrast(1.02) saturate(0.92)"
    mountains: &photo_mountains
      src: "assets/photos/matvey-mountains.jpg"
      position: "center 26%"
      filter: "brightness(0.88) contrast(1.03) saturate(0.92)"
    lake: &photo_lake
      src: "assets/photos/matvey-lake.jpg"
      filter: "brightness(0.9) contrast(1.02) saturate(0.9)"
    travel: &photo_travel
      src: "assets/photos/matvey-travel.jpg"
      filter: "brightness(1.01) contrast(1.03) saturate(0.9)"

person:
  name:
    en: "Matvey Sizov"
    ru: "Матвей Сизов"
  headline: "Backend Developer / Software Engineer"
  role:
    en: "More than 4 years in backend development. Golang, Java, distributed systems, product and infrastructure engineering."
    ru: "Более 4-х лет в backend-разработке. Golang, Java, распределенные системы, продуктовая и инфраструктурная разработка."
  summary:
    en: >-
      I started programming in Java in my early teens, entered backend professionally through Java, and then shifted my primary focus to Go because explicit and understandable systems are a better fit for me. Today I work on both infrastructure and product backends, and I am strongest where a team needs someone who can turn ambiguous requirements into a production system with reasonable trade-offs, observability, and reliable delivery. Across recent roles I have built backend systems for vehicle telemetry and car-to-cloud communication, service-mesh platform infrastructure, retail pricing operations, crypto payments and exchange flows, utility billing, and public digital services.
    ru: >-
      Я начал программировать на Java еще в раннем подростковом возрасте, вошел в профессию backend-разработчика через Java, а затем перевел основной фокус на Go, потому что мне ближе явные и понятные системы. Сейчас я работаю и с инфраструктурным, и с продуктовым backend, а сильнее всего проявляюсь там, где команде нужен человек, который превращает размытые требования в production-систему с разумными компромиссами, наблюдаемостью и надежной поставкой решений. Я строил backend-системы для телеметрии и связи автомобиля с облаком, платформенной service-mesh-инфраструктуры, операционного ценообразования в ритейле, криптоплатежей и обменных сценариев, коммунального биллинга и государственных цифровых сервисов.
  photo:
    <<: *photo_hero_studio
    caption:
      en: "Studio portrait"
      ru: "Студийный портрет"
  facts:
    - <<: *icon_fact_location
      label:
        en: "Location"
        ru: "Локация"
      value:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
    - <<: *icon_fact_experience
      label:
        en: "Experience"
        ru: "Опыт"
      value:
        en: "Golang - 4+ years\nJava - 6 months"
        ru: "Golang - 4+ года\nJava - 6 месяцев"
    - <<: *icon_fact_primary_stack
      label:
        en: "Primary stack"
        ru: "Основной стек"
      value:
        en: "Go, distributed systems"
        ru: "Go, распределенные системы"
    - <<: *icon_fact_format
      label:
        en: "Format"
        ru: "Формат"
      value:
        en: "Remote / relocation"
        ru: "Удаленно / релокация"

contacts:
  website:
    value: "https://jorqen.github.io"
  linkedin:
    <<: *icon_contact_linkedin
    value: "https://www.linkedin.com/in/jorqen"
  github:
    <<: *icon_contact_github
    value: "https://github.com/jorqen"
  telegram:
    <<: *icon_contact_telegram
    value: "https://t.me/jorqen"

