experience:
  title:
    en: "Experience"
    ru: "Опыт"
  companySiteLabel:
    en: "Company site"
    ru: "Сайт компании"
  items:
    - <<: *icon_company_atom
      company:
        en: "ATOM"
        ru: "АТОМ"
      role: "Senior Software Engineer"
      startDate: "2025-02"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          ATOM is building a Russian electric vehicle platform. I work in communications and telemetry on backend services that connect the car, cloud, and external clients, with a focus on latency, security, and operational reliability.
        ru: >-
          АТОМ строит российскую платформу электромобиля. Я работаю в направлении коммуникаций и телеметрии над backend-сервисами, которые соединяют автомобиль, облако и внешних клиентов, с фокусом на маленькую задержку, безопасность и операционную надежность.
      highlights:
        - en: "Worked with leadership, peer teams, and architects to turn ambiguous and partially unrealistic requirements into a releasable backend architecture for a new broker."
          ru: "Работал с руководством, смежными командами и архитекторами, чтобы превратить размытые и частично нереалистичные требования в релизопригодную backend-архитектуру для нового брокера."
        - en: "Designed and developed an mTLS-secured MQTT broker with Redis-based state recovery for persistent vehicle-to-cloud communication and safe session restoration after restarts."
          ru: "Спроектировал и разработал MQTT-брокер с mTLS-защитой и восстановлением состояния через Redis для постоянной коммуникации автомобиля с облаком и безопасного восстановления сессий после перезапуска."
        - en: "Challenged the initial microservice decomposition, showed it could not meet target latency, and advanced a central-broker design that sustained ~70K requests per second at p99 below 50 ms."
          ru: "Оспорил первоначальную декомпозицию на микросервисы, показал, что она не укладывается в целевую задержку, и продвинул дизайн с центральным брокером, который выдержал ~70K запросов в секунду при p99 ниже 50 мс."
        - en: "Built production observability and delivery tooling from scratch after losing dedicated DevOps support: metrics, logs, traces, dashboards, alerts, CI/CD, and deployment automation."
          ru: "С нуля собрал production-инструментарий наблюдаемости и поставки после потери выделенной DevOps-поддержки: метрики, логи, трейсы, дашборды, алерты, CI/CD и автоматизацию деплоя."
        - en: "Selected key libraries and system components, including Redis for resilient in-memory state and access-control mechanisms for trusted clients."
          ru: "Выбрал ключевые библиотеки и системные компоненты, включая Redis для устойчивого in-memory состояния и механизмы контроля доступа для доверенных клиентов."
      stack:
        - "Go"
        - "MQTT"
        - "Redis"
        - "PostgreSQL"
        - "Kafka"
        - "gRPC"
        - "mTLS"
        - "Prometheus"
        - "Grafana"
        - "Loki"
        - "Sentry"
        - "Docker"
        - "Kubernetes"
        - "CI/CD"
      url: "https://atom.auto"
    - <<: *icon_company_sbertech
      company: "Sber Tech"
      role: "Software Engineer, Service Mesh & Platform Infrastructure"
      startDate: "2024-01"
      endDate: "2025-02"
      location:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
      summary:
        en: >-
          Sber Tech develops Platform V, a large corporate platform. I worked on a heavily modified Istio fork and adjacent infrastructure components for service-mesh control, policy enforcement, and platform integration in the Service Mesh & Platform Infrastructure team. The project itself was a platform layer for routing, policy, and control-plane/data-plane management across Kubernetes environments inside the ecosystem.
        ru: >-
          Сбер Тех развивает Platform V, крупную корпоративную платформу. Я работал с сильно модифицированным форком Istio и смежными инфраструктурными компонентами для управления service mesh, контроля политик и платформенной интеграции в команде Service Mesh & Platform Infrastructure. Сам проект был платформенным слоем для маршрутизации, политик и управления связями control plane/data plane в Kubernetes-окружениях внутри экосистемы.
      highlights:
        - en: "Restored broken automated testing in a heavily modified Istio fork, returning unit tests to the daily engineering process and raising coverage to 80%."
          ru: "Восстановил сломанное автотестирование в сильно модифицированном форке Istio, вернув юнит-тесты в ежедневный инженерный процесс и подняв покрытие до 80%."
        - en: "Designed and built a Go integration-testing framework that provisioned isolated Kubernetes environments, ran tests in parallel, and generated Allure reports for CI."
          ru: "Спроектировал и реализовал Go-фреймворк интеграционного тестирования, который поднимал изолированные Kubernetes-окружения, запускал тесты параллельно и генерировал Allure-отчеты для CI."
        - en: "Expanded automation to about 95% of critical functionality through integration tests and, in parallel, fixed several critical defects, stabilizing release pipelines."
          ru: "Расширил автоматизацию примерно до 95% критического функционала через интеграционные тесты и параллельно исправил несколько критичных дефектов, стабилизируя релизные пайплайны."
        - en: "Mentored around 10 interns on the framework and automation process, helping convert manual QA scenarios into scalable automated tests."
          ru: "Наставлял около 10 стажеров по фреймворку и процессу автоматизации, помогая переводить ручные QA-сценарии в масштабируемые автотесты."
        - en: "Independently designed and implemented a custom Kubernetes resource for managing control-plane and data-plane relationships in Istio; the solution was later presented internally as a target platform approach."
          ru: "Самостоятельно спроектировал и реализовал пользовательский ресурс Kubernetes для управления связями control plane и data plane в Istio; позже решение представили внутри компании как целевой платформенный подход."
      stack:
        - "Go"
        - "Kubernetes"
        - "Istio"
        - "gRPC"
        - "REST"
        - "PostgreSQL"
        - "CI/CD"
        - "Allure"
      url: "https://sbertech.ru"
    - <<: *icon_company_lukyanov
      company: "Lukyanov Tech"
      role: "Part-Time Mentor / Mock Interviewer"
      startDate: "2024-01"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          A part-time project focused on mentorship, interview preparation, and growth of backend candidates. In practice, it is a hands-on educational service built around individual preparation tracks and mock interviews for engineers who want stronger fundamentals, clearer system-design thinking, and better performance in commercial hiring loops.
        ru: >-
          Проект неполной занятости в области менторства, подготовки к интервью и роста backend-кандидатов. На практике это прикладной образовательный сервис, построенный вокруг индивидуальных треков подготовки и пробных интервью для инженеров, которым нужны более сильная база, более ясное системное мышление и лучший результат в коммерческих процессах найма.
      highlights:
        - en: "Conduct mock interviews and mentor candidates on backend fundamentals, system design, technical communication, and answer structure."
          ru: "Провожу пробные собеседования и менторю кандидатов по backend-базе, проектированию систем, технической коммуникации и структуре ответов."
        - en: "Help improve the mentoring process, hands-on preparation, and feedback quality for students targeting engineering roles."
          ru: "Помогаю улучшать процесс менторства, практическую подготовку и качество обратной связи для студентов, идущих в инженерные роли."
      stack:
        - "Mentoring"
        - "Mock interviews"
        - "System design"
        - "Technical communication"
      url: "https://lukyanov.tech"
    - <<: *icon_company_magnus
      company: "Magnus Tech"
      role: "Software Engineer"
      startDate: "2023-03"
      endDate: "2024-01"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          Magnus Tech is a custom development company. I worked on a pricing-control platform for the Bristol shop retail chain that combines store data, employee actions, ML pricing recommendations, and photo confirmation into one operational system. The product was used by operational teams to form price, review store evidence, and coordinate corrective actions across a large retail network.
        ru: >-
          Magnus Tech - компания заказной разработки. Я работал над платформой контроля цен для сети магазинов «Бристоль», которая объединяет данные магазинов, действия сотрудников, ML-рекомендации по ценам и фотоподтверждения в единую операционную систему. Продукт использовался операционными командами для формирования цен, проверки подтверждений из магазинов и координации корректирующих действий по большой розничной сети.
      highlights:
        - en: "Developed Go backend services from scratch for the pricing platform and integrated store data, product information, ML recommendations, and employee actions into a unified backend flow."
          ru: "С нуля разрабатывал Go backend-сервисы для платформы ценообразования и интегрировал данные магазинов, продуктовую информацию, ML-рекомендации и действия сотрудников в единый backend-поток."
        - en: "Designed admin-panel APIs and internal tools for viewing prices, manual overrides, cross-store comparison, and day-to-day operational control."
          ru: "Спроектировал API панели администрирования и внутренние инструменты для просмотра цен, ручных корректировок, сравнения между магазинами и ежедневного операционного контроля."
        - en: "Integrated notification flows across web, email, SMS, and mobile channels and maintained API contracts for frontend and mobile teams."
          ru: "Интегрировал потоки уведомлений для веб, email, SMS и мобильных каналов и поддерживал API-контракты для frontend- и mobile-команд."
        - en: "Wrote tests, maintained observability, and helped bring the product from active development to production release."
          ru: "Писал тесты, поддерживал наблюдаемость и участвовал в доведении продукта от активной разработки до production-релиза."
      stack:
        - "Go"
        - "PostgreSQL"
        - "Redis"
        - "Kafka"
        - "MinIO"
        - "REST"
        - "gRPC"
        - "Prometheus"
        - "CI/CD"
      url: "https://magnustech.com"
    - <<: *icon_company_exnode
      company: "Exnode"
      role: "Backend Engineer"
      startDate: "2022-09"
      endDate: "2023-03"
      location:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
      summary:
        en: >-
          Exnode develops crypto exchange, B2B payment, and P2P trading products. I worked on backend parts of transactional flows where payments, exchange operations, and reporting had to stay consistent, fast and exact under real business load.
        ru: >-
          Exnode развивает продукты криптобиржи, B2B-платежей и P2P-обмена. Я работал над backend-частями транзакционных сценариев, где платежи, обменные операции, и отчетность должны были оставаться консистентными, быстрыми и точными под реальной бизнес-нагрузкой.
      highlights:
        - en: "Split a large monolithic backend into smaller services and replaced part of internal REST communication with gRPC to reduce latency and simplify service boundaries."
          ru: "Разделил большой монолитный backend на более мелкие сервисы и заменил часть внутреннего REST-взаимодействия на gRPC, чтобы снизить задержку и упростить границы сервисов."
        - en: "Optimized payment and reporting queries using EXPLAIN ANALYZE, cutting several heavy PostgreSQL queries from 10-30 seconds to near real time."
          ru: "Оптимизировал платежные и отчетные запросы через EXPLAIN ANALYZE, сократив несколько тяжелых PostgreSQL-запросов с 10-30 секунд до почти реального времени."
        - en: "Implemented key product capabilities around online payments, pricing, email notifications, Telegram alerts, and magic-link authentication."
          ru: "Реализовал ключевые продуктовые возможности вокруг онлайн-платежей, ценообразования, email-уведомлений, Telegram-оповещений и magic-link аутентификации."
        - en: "Investigated and localized a critical currency-conversion incident, rolled back affected transactions, and then strengthened validation, observability, and release discipline."
          ru: "Разобрал и локализовал критический инцидент с конвертацией валют, откатил затронутые транзакции и затем усилил валидацию, наблюдаемость и дисциплину релизов."
      stack:
        - "Go"
        - "PostgreSQL"
        - "Redis"
        - "RabbitMQ"
        - "REST"
        - "gRPC"
        - "Grafana"
        - "Telegram Bot API"
      url: "https://exnode.ru"
    - <<: *icon_company_kaluga
      company:
        en: "Kaluga Power Supply Company"
        ru: "Калужская сбытовая компания"
      role: "GoLang Developer"
      startDate: "2021-10"
      endDate: "2022-03"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          A customer portal and internal administrative system for personal accounts, billing, payments, and property-management operations.
        ru: >-
          Клиентский портал и внутренняя административная система для лицевых счетов, биллинга, платежей и операционных сценариев управления теплообслуживания объектов.
      highlights:
        - en: "Developed and launched the core backend architecture for a customer portal and administrative system with integrations to 1C, payments, dashboards, and web/mobile clients."
          ru: "Разработал и запустил основную backend-архитектуру клиентского портала и административной системы с интеграциями в 1С, платежи, дашборды и веб/мобильные клиенты."
        - en: "Rewrote a key service from PHP to Go, migrating critical 1C integration and payment-processing scenarios without losing business functionality."
          ru: "Переписал на Go ключевой сервис, ранее реализованный на PHP: перенес критичные сценарии интеграции с 1С и обработки платежей без потери бизнес-функциональности."
        - en: "Worked as the sole backend engineer on the project, delivering account, billing, and operational views for customers and property management."
          ru: "Работал единственным backend-инженером на проекте, реализуя аккаунты, биллинг и операционные представления для клиентов и управления объектами."
      stack:
        - "Go"
        - "PHP"
        - "PostgreSQL"
        - "1C integrations"
        - "Payments"
        - "Dashboards"
      url: "https://kskkaluga.ru"
    - company:
        en: "Center for Regional Management of Lipetsk Oblast (CUR)"
        ru: "Центр Управления Регионом Липецкой области (ЦУР)"
      role: "Java Developer"
      startDate: "2021-06"
      endDate: "2021-11"
      location:
        en: "Lipetsk, Russia"
        ru: "Липецк, Россия"
      summary:
        en: >-
          The projects were regional digital services and monitoring tools that supported government workflows and citizen-facing operational reporting.
        ru: >-
          Проекты представляли собой региональные цифровые сервисы и инструменты мониторинга, которые поддерживали государственные процессы и операционную отчетность для сценариев, связанных с гражданами.
      highlights:
        - en: "Contributed to backend services for regional digital products and monitoring systems in an environment with a large amount of legacy systems."
          ru: "Участвовал в разработке backend-сервисов для региональных цифровых продуктов и систем мониторинга в окружении с большим количеством легаси-систем."
        - en: "Worked on business logic and service development for government processes."
