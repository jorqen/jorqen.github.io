    companies:
      atom: &icon_company_atom
        icon: "assets/icons/atom.svg"
      sbertech: &icon_company_sbertech
        icon: "assets/icons/light/sbertech.svg"
        iconDark: "assets/icons/dark/sbertech.svg"
      lukyanovTech: &icon_company_lukyanov
