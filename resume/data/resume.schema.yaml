"$schema": "http://json-schema.org/draft-07/schema#"
"$id": "https://jorqen.github.io/resume/data/resume.schema.yaml"
title: "Jorqen Resume Source"
description: "JSON Schema validation contract for resume/data/resume.yaml."
type: "object"
required:
  - "schema"
  - "defaultLanguage"
  - "languages"
  - "assets"
  - "person"
  - "contacts"
  - "resumeLabels"
  - "experience"
  - "education"
  - "strengths"
  - "skills"
  - "preferences"
  - "gallery"
additionalProperties: false
properties:
  schema:
    const: "jorqen.resume.v1"
  defaultLanguage:
    const: "en"
  languages:
    type: "array"
    minItems: 2
    maxItems: 2
    items:
      - const: "en"
      - const: "ru"
    additionalItems: false
  assets:
    "$ref": "#/definitions/assets"
  person:
    "$ref": "#/definitions/person"
  contacts:
    type: "object"
    required:
      - "website"
      - "linkedin"
      - "github"
      - "telegram"
    additionalProperties: false
    properties:
      website:
        "$ref": "#/definitions/websiteContact"
      linkedin:
        "$ref": "#/definitions/contact"
      github:
        "$ref": "#/definitions/contact"
      telegram:
        "$ref": "#/definitions/contact"
  resumeLabels:
    type: "object"
    required:
      - "stack"
      - "present"
      - "expectedGraduation"
    additionalProperties: false
    properties:
      stack:
        "$ref": "#/definitions/localizedString"
      present:
        "$ref": "#/definitions/localizedString"
      expectedGraduation:
        "$ref": "#/definitions/localizedString"
  experience:
    "$ref": "#/definitions/experienceSection"
  education:
    "$ref": "#/definitions/educationSection"
  strengths:
    "$ref": "#/definitions/strengthsSection"
  skills:
    "$ref": "#/definitions/skillsSection"
  preferences:
    "$ref": "#/definitions/preferencesSection"
  gallery:
    "$ref": "#/definitions/gallerySection"
definitions:
  stringValue:
    type: "string"
    minLength: 1
  localizedString:
    oneOf:
      - "$ref": "#/definitions/stringValue"
      - "$ref": "#/definitions/localizedStringMap"
  localizedStringMap:
    type: "object"
    required:
      - "en"
      - "ru"
    additionalProperties: false
    properties:
      en:
        "$ref": "#/definitions/stringValue"
      ru:
        "$ref": "#/definitions/stringValue"
  assets:
    type: "object"
    required:
      - "icons"
      - "photos"
    additionalProperties: false
    properties:
      icons:
        type: "object"
        required:
          - "heroFacts"
          - "contacts"
          - "companies"
        additionalProperties: false
        properties:
          heroFacts:
            "$ref": "#/definitions/iconAssetCollection"
          contacts:
            "$ref": "#/definitions/iconAssetCollection"
          companies:
            "$ref": "#/definitions/iconAssetCollection"
      photos:
        "$ref": "#/definitions/photoAssetCollection"
  iconAssetCollection:
    type: "object"
    minProperties: 1
    additionalProperties:
      "$ref": "#/definitions/iconAsset"
  photoAssetCollection:
    type: "object"
    minProperties: 1
    additionalProperties:
      "$ref": "#/definitions/photoAsset"
  iconAsset:
    type: "object"
    required:
      - "icon"
    additionalProperties: false
    properties:
      icon:
        "$ref": "#/definitions/assetPath"
      iconDark:
        "$ref": "#/definitions/assetPath"
  photoAsset:
    type: "object"
    required:
      - "src"
      - "filter"
    additionalProperties: false
    properties:
      src:
        "$ref": "#/definitions/stringValue"
      position:
        "$ref": "#/definitions/stringValue"
      filter:
        "$ref": "#/definitions/stringValue"
  person:
    type: "object"
    required:
      - "name"
      - "headline"
      - "role"
      - "summary"
      - "photo"
      - "facts"
    additionalProperties: false
    properties:
      name:
        "$ref": "#/definitions/localizedString"
      headline:
        "$ref": "#/definitions/stringValue"
      role:
        "$ref": "#/definitions/localizedString"
      summary:
        "$ref": "#/definitions/localizedString"
      photo:
        "$ref": "#/definitions/imageAsset"
      facts:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/fact"
  contact:
    type: "object"
    required:
      - "value"
    additionalProperties: false
    properties:
      value:
        "$ref": "#/definitions/stringValue"
      icon:
        "$ref": "#/definitions/assetPath"
      iconDark:
        "$ref": "#/definitions/assetPath"
  websiteContact:
    allOf:
      - "$ref": "#/definitions/contact"
      - type: "object"
        properties:
          value:
            const: "https://jorqen.github.io"
  imageAsset:
    type: "object"
    required:
      - "src"
      - "caption"
      - "filter"
    additionalProperties: false
    properties:
      src:
        "$ref": "#/definitions/stringValue"
      caption:
        "$ref": "#/definitions/localizedString"
      position:
        "$ref": "#/definitions/stringValue"
      filter:
        "$ref": "#/definitions/stringValue"
  assetPath:
    type: "string"
    minLength: 1
  fact:
    type: "object"
    required:
      - "icon"
      - "label"
      - "value"
    additionalProperties: false
    properties:
      icon:
        "$ref": "#/definitions/assetPath"
      iconDark:
        "$ref": "#/definitions/assetPath"
      label:
        "$ref": "#/definitions/localizedString"
      value:
        "$ref": "#/definitions/localizedString"
  experienceSection:
    type: "object"
    required:
      - "title"
      - "companySiteLabel"
      - "items"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      companySiteLabel:
        "$ref": "#/definitions/localizedString"
      items:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/experienceItem"
  experienceItem:
    type: "object"
    required:
      - "company"
      - "role"
      - "startDate"
      - "location"
      - "summary"
      - "highlights"
      - "stack"
    additionalProperties: false
    not:
      anyOf:
        - required:
            - "id"
        - required:
            - "period"
    properties:
      company:
        "$ref": "#/definitions/localizedString"
      role:
        "$ref": "#/definitions/stringValue"
      startDate:
        "$ref": "#/definitions/yearMonth"
      endDate:
        "$ref": "#/definitions/yearMonth"
      location:
        "$ref": "#/definitions/localizedString"
      summary:
        "$ref": "#/definitions/localizedString"
      highlights:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/localizedString"
      stack:
        "$ref": "#/definitions/stringList"
      url:
        type: "string"
        minLength: 1
        format: "uri"
      icon:
        "$ref": "#/definitions/stringValue"
      iconDark:
        "$ref": "#/definitions/stringValue"
  educationSection:
    type: "object"
    required:
      - "title"
      - "subtitle"
      - "items"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      subtitle:
        "$ref": "#/definitions/localizedString"
      institutionSiteLabel:
        "$ref": "#/definitions/localizedString"
      items:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/educationItem"
  educationItem:
    type: "object"
    required:
      - "institution"
      - "degree"
      - "startDate"
      - "endDate"
    additionalProperties: false
    properties:
      institution:
        "$ref": "#/definitions/localizedString"
      degree:
        "$ref": "#/definitions/localizedString"
      startDate:
        "$ref": "#/definitions/yearOrYearMonth"
      endDate:
        "$ref": "#/definitions/yearOrYearMonth"
      url:
        type: "string"
        minLength: 1
        format: "uri"
      icon:
        "$ref": "#/definitions/stringValue"
      iconDark:
        "$ref": "#/definitions/stringValue"
  strengthsSection:
    type: "object"
    required:
      - "title"
      - "subtitle"
      - "cards"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      subtitle:
        "$ref": "#/definitions/localizedString"
      cards:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/titleBodyCard"
  titleBodyCard:
    type: "object"
    required:
      - "title"
      - "body"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      body:
        "$ref": "#/definitions/localizedString"
  skillsSection:
    type: "object"
    required:
      - "title"
      - "groups"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      groups:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/skillGroup"
  skillGroup:
    type: "object"
    required:
      - "title"
      - "items"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      items:
        "$ref": "#/definitions/stringList"
  preferencesSection:
    type: "object"
    required:
      - "title"
      - "items"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      items:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/localizedString"
  gallerySection:
    type: "object"
    required:
      - "title"
      - "subtitle"
      - "items"
    additionalProperties: false
    properties:
      title:
        "$ref": "#/definitions/localizedString"
      subtitle:
        "$ref": "#/definitions/localizedString"
      items:
        type: "array"
        minItems: 1
        items:
          "$ref": "#/definitions/imageAsset"
  stringList:
    type: "array"
    minItems: 1
    items:
      "$ref": "#/definitions/stringValue"
  yearMonth:
    type: "string"
    pattern: '^\d{4}-\d{2}$'
  yearOrYearMonth:
    type: "string"
    pattern: '^\d{4}(-\d{2})?$'
