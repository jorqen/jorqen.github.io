      filter: "brightness(1.01) contrast(1.03) saturate(0.9)"

person:
  name:
    en: "Matvey Sizov"
    ru: "Матвей Сизов"
  headline: "Backend Developer / Software Engineer"
  role:
    en: "4+ years building production Go backends and distributed systems | high-load and low-latency infrastructure, service mesh, and fintech/crypto products."
    ru: "4+ года строю production backend-системы и распределенные системы на Go | high-load и low-latency инфраструктура, service mesh и fintech/crypto-продукты."
  summary:
    en: >-
      I am a backend and distributed systems engineer with 4+ years of commercial experience in Go. I work across both product and infrastructure domains and am strongest where ambiguous requirements need to become a concrete production system with sound trade-offs, observability, security, testing, and reliable delivery. Across recent roles I have built backend systems for secure vehicle telemetry and car-to-cloud connectivity, service-mesh platform infrastructure and testing frameworks, retail pricing operations, crypto payments and exchange flows, utility billing, and public digital services.
    ru: >-
      Я backend-инженер и инженер распределенных систем с 4+ годами коммерческого опыта на Go. Работаю и в продуктовых, и в инфраструктурных доменах и сильнее всего проявляюсь там, где размытые требования нужно превратить в конкретную production-систему с понятными компромиссами, наблюдаемостью, безопасностью, тестированием и надежной поставкой. В последних ролях я строил backend-системы для защищенной телеметрии и связи автомобиля с облаком, service mesh-инфраструктуры и тестовых фреймворков, операционного ценообразования в ритейле, криптоплатежей и обменных сценариев, коммунального биллинга и государственных цифровых сервисов.
  photo:
    <<: *photo_hero_studio
    caption:
      en: "Studio portrait"
      ru: "Студийный портрет"
  facts:
    - <<: *icon_fact_location
      label:
        en: "Location"
        ru: "Локация"
      value:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
    - <<: *icon_fact_experience
      label:
        en: "Experience"
        ru: "Опыт"
      value:
        en: "Go - 4+ years\nJava - 6 months"
        ru: "Go - 4+ года\nJava - 6 месяцев"
    - <<: *icon_fact_primary_stack
      label:
        en: "Primary stack"
        ru: "Основной стек"
      value:
        en: "Go, distributed systems"
        ru: "Go, распределенные системы"
    - <<: *icon_fact_format
      label:
        en: "Format"
        ru: "Формат"
      value:
        en: "Remote / relocation"
        ru: "Удаленно / релокация"

contacts:
  website:
    value: "https://jorqen.github.io"
  linkedin:
    <<: *icon_contact_linkedin
    value: "https://www.linkedin.com/in/jorqen"
  github:
    <<: *icon_contact_github
    value: "https://github.com/jorqen"
  telegram:
    <<: *icon_contact_telegram
    value: "https://t.me/jorqen"

