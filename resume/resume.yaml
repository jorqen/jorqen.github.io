          ru: "Спроектировал и запустил основную Go backend-архитектуру клиентского портала и административной системы с интеграциями в 1С, платежи, дашборды и веб/мобильные клиенты."
        - en: "Rewrote a key PHP service in Go, migrating critical 1C integration and payment-processing scenarios without losing business functionality."
          ru: "Переписал ключевой PHP-сервис на Go, перенеся критичные сценарии интеграции с 1С и обработки платежей без потери бизнес-функциональности."
        - en: "Acted as the sole backend engineer on the project, delivering account, billing, and operational views for customers and property management."
          ru: "Работал единственным backend-инженером на проекте, реализуя аккаунты, биллинг и операционные представления для клиентов и управления объектами."
