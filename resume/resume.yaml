person:
  name:
    en: "Matvey Sizov"
    ru: "Матвей Сизов"
  headline: "Backend Developer / Software Engineer"
  role:
    en: "4+ years building production Go backend systems | distributed systems, high-load and low-latency infrastructure, service mesh, and fintech/crypto products."
    ru: "4+ года строю production backend-системы на Go | распределенные системы, высоконагруженная и низколатентная инфраструктура, service mesh и fintech/crypto-продукты."
  summary:
    en: >-
      Backend engineer specializing in Go, distributed systems, and low-latency infrastructure. I have 4+ years of commercial experience building production services across vehicle telemetry and car-to-cloud connectivity, service-mesh platform infrastructure, retail pricing operations, crypto payments and exchange flows, utility billing, and public digital services. My strongest work is turning ambiguous requirements into reliable systems: clarifying trade-offs, choosing architecture, implementing core services, adding observability and security, and carrying delivery through CI/CD into production operation.
    ru: >-
      Backend-инженер, специализирующийся на Go, распределенных системах и низколатентной инфраструктуре. У меня 4+ года коммерческого опыта в разработке production-сервисов для телеметрии автомобиля и связи car-to-cloud, service mesh-инфраструктуры, операционного ценообразования в ритейле, криптоплатежей и обменных сценариев, коммунального биллинга и государственных цифровых сервисов. Моя сильная сторона - превращать неоднозначные требования в надежные системы: прояснять компромиссы, выбирать архитектуру, реализовывать ключевые сервисы, добавлять наблюдаемость и безопасность и доводить поставку через CI/CD до production-эксплуатации.
  photo:
    <<: *photo_hero_studio
    caption:
      en: "Studio portrait"
      ru: "Студийный портрет"
  facts:
    - <<: *icon_fact_location
      label:
        en: "Location"
        ru: "Локация"
      value:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
    - <<: *icon_fact_experience
      label:
        en: "Experience"
        ru: "Опыт"
      value:
        en: "Go - 4+ years\nJava - 6 months"
        ru: "Go - 4+ года\nJava - 6 месяцев"
    - <<: *icon_fact_primary_stack
      label:
        en: "Primary stack"
        ru: "Основной стек"
      value:
        en: "Go, distributed systems"
        ru: "Go, распределенные системы"
    - <<: *icon_fact_format
      label:
        en: "Format"
        ru: "Формат"
      value:
        en: "Remote / relocation"
        ru: "Удаленно / релокация"

