  companySiteLabel:
    en: "Company site"
    ru: "Сайт компании"
  items:
    - <<: *icon_company_atom
      company:
        en: "ATOM"
        ru: "АТОМ"
      role: "Senior Software Engineer"
      startDate: "2025-02"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          ATOM develops an electric vehicle platform. I work in communications and telemetry on backend services responsible for secure vehicle-to-cloud connectivity, external client integration, and operational reliability under low-latency requirements.
        ru: >-
          АТОМ развивает платформу электромобиля. Я работаю в направлении коммуникаций и телеметрии над backend-сервисами, которые отвечают за защищенную связь автомобиля с облаком, интеграцию внешних клиентов и операционную надежность при жестких требованиях к задержке.
      highlights:
        - en: "Worked with leadership, peer teams, and architects to turn ambiguous and partially unrealistic requirements into a releasable first version, simplifying an overengineered concept into a cleaner broker-centered architecture."
          ru: "Работал с руководством, смежными командами и архитекторами, чтобы превратить размытые и частично нереалистичные требования в релизопригодную первую версию, упростив переусложненную концепцию до более чистой архитектуры вокруг брокера."
        - en: "Designed and co-developed an mTLS-secured MQTT broker on Mochi MQTT with Redis-backed state recovery for persistent vehicle-to-cloud communication and safe session restoration after restarts."
          ru: "Спроектировал и совместно разработал MQTT-брокер на Mochi MQTT с mTLS-защитой и восстановлением состояния через Redis для постоянной коммуникации автомобиля с облаком и безопасного восстановления сессий после перезапуска."
        - en: "Challenged the initial microservice decomposition, showed it could not meet target latency, and advanced a central-broker design that sustained ~70K requests per second at p99 below 50 ms."
          ru: "Оспорил первоначальную декомпозицию на микросервисы, показал, что она не укладывается в целевую задержку, и продвинул дизайн с центральным брокером, который выдержал ~70K запросов в секунду при p99 ниже 50 мс."
        - en: "Built production observability and delivery tooling from scratch after losing dedicated DevOps support: metrics, logs, traces, dashboards, alerts, latency/throughput monitoring, business health signals, CI/CD, and deployment automation."
          ru: "С нуля собрал production-инструментарий наблюдаемости и поставки после потери выделенной DevOps-поддержки: метрики, логи, трейсы, дашборды, алерты, мониторинг задержек и пропускной способности, бизнесовые сигналы состояния сервиса, CI/CD и автоматизацию деплоя."
        - en: "Improved security and reliability by enforcing certificate-based client authentication and topic-level access control for trusted connectivity."
          ru: "Усилил безопасность и надежность, внедрив аутентификацию клиентов по сертификатам и контроль доступа на уровне топиков для доверенного контура связи."
      stack:
        - "Go"
        - "MQTT"
        - "Mochi MQTT"
        - "Redis"
        - "PostgreSQL"
        - "Kafka"
        - "gRPC"
        - "mTLS"
        - "Prometheus"
        - "Grafana"
        - "Loki"
        - "Sentry"
        - "Docker"
        - "Helm"
        - "Kubernetes"
        - "CI/CD"
      url: "https://atom.auto"
    - <<: *icon_company_sbertech
      company: "Sber Tech"
      role: "Software Engineer"
      startDate: "2024-01"
      endDate: "2025-02"
      location:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
      summary:
        en: >-
          Sber Tech develops Platform V, a large enterprise platform. I worked on a heavily customized Istio fork and adjacent infrastructure components used for workload control, policy enforcement, and platform integration in the Service Mesh & Platform Infrastructure team.
        ru: >-
          Sber Tech развивает Platform V, крупную корпоративную платформу. Я работал с сильно кастомизированным форком Istio и смежными инфраструктурными компонентами для управления рабочими нагрузками, контроля политик и платформенной интеграции в команде Service Mesh & Platform Infrastructure.
      highlights:
        - en: "Restored broken automated testing in a heavily modified Istio fork, returning unit tests to the daily engineering process and raising coverage to 80%."
          ru: "Восстановил сломанное автотестирование в сильно модифицированном форке Istio, вернув юнит-тесты в ежедневный инженерный процесс и подняв покрытие до 80%."
        - en: "Designed and built a Go integration-testing framework that provisioned isolated Kubernetes environments, ran tests in parallel, and generated Allure reports for CI."
          ru: "Спроектировал и реализовал Go-фреймворк интеграционного тестирования, который поднимал изолированные Kubernetes-окружения, запускал тесты параллельно и генерировал Allure-отчеты для CI."
        - en: "Repaired CI pipelines and shifted defect detection earlier in the development cycle by expanding integration-test automation to about 95% of critical functionality and fixing several critical defects."
          ru: "Починил CI-пайплайны и сдвинул поиск дефектов на более ранний этап разработки, расширив автоматизацию интеграционными тестами примерно до 95% критического функционала и исправив несколько критичных дефектов."
        - en: "Mentored around 10 interns - students from School 21, on the framework and automation process, helping convert manual QA scenarios into scalable automated tests."
          ru: "Наставлял около 10 стажеров - студентов Школы 21, по фреймворку и процессу автоматизации, помогая переводить ручные QA-сценарии в масштабируемые автотесты."
        - en: "Independently designed and implemented a custom Kubernetes resource for managing control-plane and data-plane relationships in Istio; the solution was later presented internally as a target platform approach."
          ru: "Самостоятельно спроектировал и реализовал пользовательский ресурс Kubernetes для управления связями control plane и data plane в Istio; позже решение представили внутри компании как целевой платформенный подход."
      stack:
        - "Go"
        - "Kubernetes"
        - "Istio"
        - "gRPC"
        - "REST"
        - "PostgreSQL"
        - "CI/CD"
        - "Allure"
      url: "https://sbertech.ru"
    - <<: *icon_company_lukyanov
      company: "Lukyanov Tech"
      role: "Part-Time Mentor / Mock Interviewer"
      startDate: "2024-01"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          A part-time project focused on mentorship, interview preparation, and growth of backend candidates. In practice, it is a hands-on educational service built around individual preparation tracks and mock interviews for engineers who want stronger fundamentals, clearer system-design thinking, and better performance in commercial hiring loops.
        ru: >-
          Проект неполной занятости в области менторства, подготовки к интервью и роста backend-кандидатов. На практике это прикладной образовательный сервис, построенный вокруг индивидуальных треков подготовки и пробных интервью для инженеров, которым нужны более сильная база, более ясное системное мышление и лучший результат в коммерческих процессах найма.
      highlights:
        - en: "Conduct mock interviews and mentor candidates on backend fundamentals, system design, technical communication, and answer structure."
          ru: "Провожу пробные собеседования и менторю кандидатов по backend-базе, проектированию систем, технической коммуникации и структуре ответов."
        - en: "Help improve the mentoring process, hands-on preparation, and feedback quality for students targeting engineering roles."
          ru: "Помогаю улучшать процесс менторства, практическую подготовку и качество обратной связи для студентов, идущих в инженерные роли."
      stack:
        - "Mentoring"
        - "Mock interviews"
        - "System design"
        - "Technical communication"
      url: "https://lukyanov.tech"
    - <<: *icon_company_magnus
      company: "Magnus Tech"
      role: "Software Engineer"
      startDate: "2023-03"
      endDate: "2024-01"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          Magnus Tech is a custom development company. I worked on a pricing-control platform for the Bristol shop retail chain that combines store data, employee actions, ML pricing recommendations, and photo confirmation into one operational system. The product was used by operational teams to form price, review store evidence, and coordinate corrective actions across a large retail network.
        ru: >-
          Magnus Tech - компания заказной разработки. Я работал над платформой контроля цен для сети магазинов «Бристоль», которая объединяет данные магазинов, действия сотрудников, ML-рекомендации по ценам и фотоподтверждения в единую операционную систему. Продукт использовался операционными командами для формирования цен, проверки подтверждений из магазинов и координации корректирующих действий по большой розничной сети.
      highlights:
        - en: "Developed Go backend services from scratch for the pricing platform and integrated store data, product information, ML recommendations, and employee actions into a unified backend flow."
          ru: "С нуля разрабатывал Go backend-сервисы для платформы ценообразования и интегрировал данные магазинов, продуктовую информацию, ML-рекомендации и действия сотрудников в единый backend-поток."
        - en: "Designed admin-panel APIs and internal tools for viewing prices, manual overrides, cross-store comparison, and day-to-day operational control."
          ru: "Спроектировал API панели администрирования и внутренние инструменты для просмотра цен, ручных корректировок, сравнения между магазинами и ежедневного операционного контроля."
        - en: "Integrated notification flows across web, email, SMS, and mobile channels and maintained API contracts for frontend and mobile teams."
          ru: "Интегрировал потоки уведомлений для веб, email, SMS и мобильных каналов и поддерживал API-контракты для frontend- и mobile-команд."
        - en: "Wrote tests, maintained observability, and helped bring the product from active development to production release."
          ru: "Писал тесты, поддерживал наблюдаемость и участвовал в доведении продукта от активной разработки до production-релиза."
