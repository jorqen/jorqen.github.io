strengths:
  title:
    en: "Profile"
    ru: "Профиль"
  subtitle:
    en: "Patterns that best describe my engineering style and career direction."
    ru: "Паттерны, которые лучше всего описывают мой инженерный стиль и карьерное направление."
  cards:
    - title:
        en: "Architecture through trade-offs"
        ru: "Архитектура через компромиссы"
      body:
        en: "For me, choosing the right tool and the right system shape matters: Redis or PostgreSQL, gRPC or REST, a more complex setup or a simplified architecture to minimize latency and improve adaptability."
        ru: "Мне важно выбирать правильный инструмент и правильную форму системы: Redis или PostgreSQL, gRPC или REST, более сложная схема или упрощение архитектуры ради минимизации задержки и увеличения мобильности."
    - title:
        en: "Product + infrastructure"
        ru: "Продукт + инфраструктура"
      body:
        en: "My recent roles are infrastructure-focused, but I also built product backend systems for retail pricing, crypto payments, utility billing, and internal administrative panels."
        ru: "Последние роли у меня инфраструктурные, но я также строил продуктовые backend-системы для ценообразования в ритейле, криптоплатежей, коммунального биллинга и внутренних административных панелей."
    - title:
        en: "Leadership trajectory"
        ru: "Траектория в лидерство"
      body:
        en: "I already mentor candidates and interns, and in the coming years I want to grow into technical leadership without losing hands-on depth and systems thinking."
        ru: "Я уже менторю кандидатов и стажеров, а в ближайшие годы хочу вырасти в техническое лидерство, не теряя прикладной глубины и системного мышления."
    - title:
        en: "From Java to Go"
        ru: "От Java к Go"
      body:
        en: "I have 4 years of commercial backend development in Go and 6 months in Java. I started with Java as a teenager, got my first commercial backend role in Java, and then moved to Go because explicit engineering, simpler syntax, and low-latency services fit me better."
        ru: "У меня 4 года коммерческой backend-разработки на Go и 6 месяцев на Java. Я начал с Java еще подростком, получил первую коммерческую backend-роль на Java, а затем перешел в Go, потому что мне ближе явная инженерия, более простой синтаксис и сервисы с низкой задержкой."

