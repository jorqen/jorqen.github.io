preferences:
  title:
    en: "What recruiters should know"
    ru: "Что важно знать рекрутеру"
  items:
    - en: "I primarily see myself as a backend engineer and feel strongest in Go, distributed systems, and complex backend logic."
      ru: "Я в первую очередь вижу себя backend-инженером и сильнее всего чувствую себя в Go, распределенных системах и сложной backend-логике."
    - en: "I am comfortable in both product and platform teams: I can switch between latency-sensitive infrastructure and business-facing backend functionality."
      ru: "Мне комфортно и в продуктовых, и в платформенных командах: я умею переключаться между инфраструктурой, чувствительной к задержкам, и backend-функциональностью, которая ближе к бизнесу."
    - en: "I am the best fit for teams solving high-load, low-latency, or technically ambiguous backend problems."
      ru: "Лучше всего подхожу командам, которые решают высоконагруженные, низколатентные или технически неоднозначные backend-задачи."
    - en: "In the next 2-5 years, I want to grow into a tech lead and broader technical leadership role while remaining a deeply technical engineer."
      ru: "В ближайшие 2-5 лет хочу вырасти в роль техлида и технического лидера, оставаясь при этом глубоко техническим инженером."
    - en: "Russian is my native language; English is B2 / working proficiency, and I use it in work when needed."
      ru: "Русский - мой родной язык; английский - B2 / рабочий уровень, и я использую его в работе, когда это нужно."
    - en: "Outside work, I mentor candidates, cycle, swim, go to the gym, and enjoy traveling; Japan is one of the places I especially want to revisit."
      ru: "Вне работы я менторю кандидатов, катаюсь на велосипеде, плаваю, хожу в зал и люблю путешествовать; Япония - одно из мест, куда мне особенно хочется вернуться."

