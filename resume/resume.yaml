  companySiteLabel:
    en: "Company site"
    ru: "Сайт компании"
  items:
    - <<: *icon_company_atom
      company:
        en: "ATOM"
        ru: "АТОМ"
      role: "Senior Software Engineer"
      startDate: "2025-02"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          ATOM develops an electric-vehicle platform. In the communications and telemetry area, I build backend services for secure vehicle-to-cloud connectivity, external client integration, and reliable low-latency operation.
        ru: >-
          АТОМ развивает платформу электромобиля. В направлении коммуникаций и телеметрии я строю backend-сервисы для защищенной связи автомобиля с облаком, интеграции внешних клиентов и надежной работы с низкой задержкой.
      highlights:
        - en: "Aligned leadership, peer teams, and architects around an MVP architecture for ambiguous requirements, simplifying an initially overcomplicated service split into a broker-centered design that could be released and operated."
          ru: "Согласовал с руководством, смежными командами и архитекторами MVP-архитектуру для неоднозначных требований, упростив изначально переусложненную декомпозицию сервисов до брокер-центричного дизайна, который можно было выпустить и эксплуатировать."
        - en: "Designed and co-developed an mTLS-secured MQTT broker on Mochi MQTT with Redis-backed session and state recovery for persistent vehicle-to-cloud communication and safe restarts."
          ru: "Спроектировал и совместно разработал MQTT-брокер на Mochi MQTT с mTLS-защитой и восстановлением сессий и состояния через Redis для постоянной коммуникации автомобиля с облаком и безопасных перезапусков."
        - en: "Validated latency limits of the initial microservice decomposition and drove the central-broker approach that sustained ~70K requests per second with p99 latency below 50 ms."
          ru: "Проверил ограничения по задержке в первоначальной микросервисной декомпозиции и продвинул подход с центральным брокером, который выдержал ~70K запросов в секунду при p99 ниже 50 мс."
        - en: "Built production observability and delivery tooling from scratch: metrics, logs, traces, dashboards, alerts, latency/throughput and business-health monitoring, CI/CD, and deployment automation."
          ru: "С нуля построил production-инструменты наблюдаемости и поставки: метрики, логи, трейсы, дашборды, алерты, мониторинг задержек/пропускной способности и бизнес-состояния, CI/CD и автоматизацию деплоя."
        - en: "Strengthened trusted connectivity by enforcing certificate-based client authentication and topic-level authorization."
          ru: "Усилил доверенный контур связи, внедрив аутентификацию клиентов по сертификатам и авторизацию на уровне топиков."
      stack:
        - "Go"
        - "MQTT"
        - "Mochi MQTT"
        - "Redis"
        - "PostgreSQL"
        - "Kafka"
        - "gRPC"
        - "mTLS"
        - "Prometheus"
        - "Grafana"
        - "Loki"
        - "Sentry"
        - "Docker"
        - "Helm"
        - "Kubernetes"
        - "CI/CD"
      url: "https://atom.auto"
    - <<: *icon_company_sbertech
      company: "Sber Tech"
      role: "Software Engineer"
      startDate: "2024-01"
      endDate: "2025-02"
      location:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
      summary:
        en: >-
          Sber Tech develops Platform V, a large enterprise platform. In the Service Mesh & Platform Infrastructure team, I worked on a heavily customized Istio fork and adjacent Kubernetes components for workload control, policy enforcement, and platform integration.
        ru: >-
          Sber Tech развивает Platform V, крупную корпоративную платформу. В команде Service Mesh & Platform Infrastructure я работал с сильно кастомизированным форком Istio и смежными Kubernetes-компонентами для управления рабочими нагрузками, контроля политик и платформенной интеграции.
      highlights:
        - en: "Restored the automated test suite in a heavily customized Istio fork, returning unit tests to daily development and raising coverage to 80%."
          ru: "Восстановил набор автотестов в сильно кастомизированном форке Istio, вернув юнит-тесты в ежедневную разработку и подняв покрытие до 80%."
        - en: "Designed and built a Go integration-testing framework that provisioned isolated Kubernetes environments, ran tests in parallel, and generated Allure reports for CI."
          ru: "Спроектировал и реализовал Go-фреймворк интеграционного тестирования, который поднимал изолированные Kubernetes-окружения, запускал тесты параллельно и генерировал Allure-отчеты для CI."
        - en: "Repaired CI pipelines and expanded integration-test automation to ~95% of critical functionality, moving defect detection earlier and helping fix several critical issues."
          ru: "Починил CI-пайплайны и расширил автоматизацию интеграционными тестами до ~95% критического функционала, сдвинув поиск дефектов на более ранний этап и помогая исправить несколько критичных проблем."
        - en: "Mentored ~10 School 21 interns on the framework and automation process, helping convert manual QA scenarios into scalable automated tests."
          ru: "Наставлял ~10 стажеров из Школы 21 по фреймворку и процессу автоматизации, помогая переводить ручные QA-сценарии в масштабируемые автотесты."
        - en: "Designed and implemented a custom Kubernetes resource for managing control-plane/data-plane relationships in Istio; the solution was later presented internally as a target platform approach."
          ru: "Спроектировал и реализовал пользовательский ресурс Kubernetes для управления связями control plane/data plane в Istio; позже решение представили внутри компании как целевой платформенный подход."
      stack:
        - "Go"
        - "Kubernetes"
        - "Istio"
        - "gRPC"
        - "REST"
        - "PostgreSQL"
        - "CI/CD"
        - "Allure"
      url: "https://sbertech.ru"
    - <<: *icon_company_lukyanov
      company: "Lukyanov Tech"
      role: "Part-Time Mentor / Mock Interviewer"
      startDate: "2024-01"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          Part-time mentorship project for backend candidates preparing for engineering interviews. I run practical preparation tracks and mock interviews focused on backend fundamentals, system design, technical communication, and structured feedback.
        ru: >-
          Проект неполной занятости по менторству backend-кандидатов, которые готовятся к инженерным интервью. Я веду практические треки подготовки и пробные собеседования с фокусом на backend-базу, system design, техническую коммуникацию и структурированную обратную связь.
      highlights:
        - en: "Conduct mock interviews and mentor candidates on backend fundamentals, system design, technical communication, and answer structure."
          ru: "Провожу пробные собеседования и менторю кандидатов по backend-базе, проектированию систем, технической коммуникации и структуре ответов."
        - en: "Provide structured feedback and improve preparation materials and processes so candidates can turn weak interview signals into concrete practice tasks."
          ru: "Даю структурированную обратную связь и улучшаю материалы и процессы подготовки, чтобы кандидаты могли превращать слабые сигналы на интервью в конкретные практические задачи."
      stack:
        - "Mentoring"
        - "Mock interviews"
        - "System design"
        - "Technical communication"
      url: "https://lukyanov.tech"
    - <<: *icon_company_magnus
      company: "Magnus Tech"
      role: "Software Engineer"
      startDate: "2023-03"
      endDate: "2024-01"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          Magnus Tech is a custom software development company. I worked on a pricing-control platform for the Bristol retail chain that combined store data, employee actions, ML pricing recommendations, and photo confirmations into one operational workflow. Operations teams used it to prepare price changes, review evidence from stores, and coordinate corrective actions across a large retail network.
        ru: >-
          Magnus Tech - компания заказной разработки ПО. Я работал над платформой контроля цен для сети магазинов «Бристоль», которая объединяла данные магазинов, действия сотрудников, ML-рекомендации по ценам и фотоподтверждения в единый операционный процесс. Операционные команды использовали продукт для подготовки изменений цен, проверки подтверждений из магазинов и координации корректирующих действий по большой розничной сети.
      highlights:
        - en: "Designed and developed Go backend services from scratch for the pricing platform, integrating store data, product information, ML recommendations, and employee actions into a unified backend flow."
          ru: "Спроектировал и разрабатывал с нуля Go backend-сервисы для платформы ценообразования, интегрируя данные магазинов, продуктовую информацию, ML-рекомендации и действия сотрудников в единый backend-поток."
        - en: "Built admin-panel APIs and internal tools for viewing prices, manual overrides, cross-store comparison, and day-to-day operational control."
          ru: "Реализовал API панели администрирования и внутренние инструменты для просмотра цен, ручных корректировок, сравнения между магазинами и ежедневного операционного контроля."
        - en: "Integrated multi-channel notification flows across web, email, SMS, and mobile clients and maintained API contracts for frontend and mobile teams."
          ru: "Интегрировал мультиканальные уведомления для веб, email, SMS и мобильных клиентов и поддерживал API-контракты для frontend- и mobile-команд."
        - en: "Covered critical flows with tests and observability and helped bring the product from active development to production release."
          ru: "Покрывал критичные сценарии тестами и наблюдаемостью и участвовал в доведении продукта от активной разработки до production-релиза."
      stack:
