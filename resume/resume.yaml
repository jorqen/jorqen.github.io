strengths:
  title:
    en: "Profile"
    ru: "Профиль"
  subtitle:
    en: "Patterns that best describe my engineering style and career direction."
    ru: "Паттерны, которые лучше всего описывают мой инженерный стиль и карьерное направление."
  cards:
    - title:
        en: "Architecture through trade-offs"
        ru: "Архитектура через компромиссы"
      body:
        en: "I make architectural decisions through concrete trade-offs: latency, reliability, operational complexity, team capacity, and future change cost. I am comfortable choosing between Redis and PostgreSQL, gRPC and REST, or a simpler broker-centered design and a broader microservice split."
        ru: "Я принимаю архитектурные решения через конкретные компромиссы: задержка, надежность, операционная сложность, возможности команды и стоимость будущих изменений. Мне комфортно выбирать между Redis и PostgreSQL, gRPC и REST, более простым брокер-центричным дизайном и более широкой микросервисной декомпозицией."
    - title:
        en: "Product + infrastructure"
        ru: "Продукт + инфраструктура"
      body:
        en: "I have built both platform infrastructure and product backends: service mesh components, testing infrastructure, vehicle telemetry, retail pricing, crypto payments, utility billing, and administrative systems."
        ru: "Я строил и платформенную инфраструктуру, и продуктовые backend-системы: service mesh-компоненты, тестовую инфраструктуру, телеметрию автомобиля, ценообразование в ритейле, криптоплатежи, коммунальный биллинг и административные системы."
    - title:
        en: "Mentoring and technical leadership"
        ru: "Менторство и техническое лидерство"
      body:
        en: "I mentor candidates and interns, explain system design and backend fundamentals, and want my leadership path to stay grounded in hands-on engineering."
        ru: "Я менторю кандидатов и стажеров, объясняю system design и backend-базу и хочу, чтобы мой путь в лидерство оставался связанным с практической инженерией."
    - title:
        en: "Go-centered backend engineering"
        ru: "Backend-инженерия с фокусом на Go"
      body:
        en: "I have 4+ years of commercial Go backend development and 6 months of Java experience. I started in Java, moved to Go, and now focus on explicit system design, simple service boundaries, and low-latency backend services."
        ru: "У меня 4+ года коммерческой backend-разработки на Go и 6 месяцев опыта на Java. Я начал с Java, перешел на Go и сейчас фокусируюсь на явном проектировании систем, простых границах сервисов и низколатентных backend-сервисах."

