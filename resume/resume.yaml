        - "PostgreSQL"
        - "Redis"
        - "Kafka"
        - "MinIO"
        - "REST"
        - "gRPC"
        - "Prometheus"
        - "CI/CD"
      url: "https://magnustech.com"
    - <<: *icon_company_exnode
      company: "Exnode"
      role: "Backend Engineer"
      startDate: "2022-09"
      endDate: "2023-03"
      location:
        en: "Moscow, Russia"
        ru: "Москва, Россия"
      summary:
        en: >-
          Exnode develops crypto exchange, B2B payment, and P2P trading products. I worked on backend transaction flows where payments, exchange operations, and reporting had to remain consistent, fast, and accurate under real business load.
        ru: >-
          Exnode развивает продукты криптобиржи, B2B-платежей и P2P-обмена. Я работал над backend-частями транзакционных сценариев, где платежи, обменные операции и отчетность должны были оставаться консистентными, быстрыми и точными под реальной бизнес-нагрузкой.
      highlights:
        - en: "Split a large monolithic backend into smaller services and moved part of internal communication from REST to gRPC, reducing latency and clarifying service boundaries."
          ru: "Разделил большой монолитный backend на более мелкие сервисы и перевел часть внутреннего взаимодействия с REST на gRPC, снижая задержку и проясняя границы сервисов."
        - en: "Optimized payment and reporting queries using EXPLAIN ANALYZE, cutting several heavy PostgreSQL queries from 10-30 seconds to near real time."
          ru: "Оптимизировал платежные и отчетные запросы через EXPLAIN ANALYZE, сократив несколько тяжелых PostgreSQL-запросов с 10-30 секунд до почти реального времени."
        - en: "Implemented core product capabilities for P2P exchange and online payments, including pricing logic, service integrations, email notifications, Telegram alerts, and magic-link authentication in a lean two-engineer backend setup."
          ru: "Реализовал ключевые продуктовые возможности для P2P-обмена и онлайн-платежей, включая логику курсов, интеграции между сервисами, email-уведомления, Telegram-оповещения и magic-link аутентификацию в компактной backend-команде из двух инженеров."
        - en: "Investigated and contained a critical currency-conversion incident, rolled back affected transactions, and then strengthened validation, observability, and release discipline to reduce recurrence risk."
          ru: "Разобрал и локализовал критический инцидент с конвертацией валют, откатил затронутые транзакции и затем усилил валидацию, наблюдаемость и дисциплину релизов, чтобы снизить риск повторения."
      stack:
        - "Go"
        - "PostgreSQL"
        - "Redis"
        - "RabbitMQ"
        - "REST"
        - "gRPC"
        - "Grafana"
        - "Telegram Bot API"
      url: "https://exnode.ru"
    - <<: *icon_company_kaluga
      company:
        en: "Kaluga Power Supply Company"
        ru: "Калужская сбытовая компания"
      role: "Backend Engineer (Go)"
      startDate: "2021-10"
      endDate: "2022-03"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
