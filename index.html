<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <meta
      name="description"
      content="Matvey Sizov - Backend Developer / Software Engineer. Distributed systems, high-load services, and cloud reliability."
    />
    <link rel="canonical" href="https://jorqen.github.io/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="jorqen.github.io" />
    <meta property="og:title" content="Matvey Sizov | Backend Developer / Software Engineer" />
    <meta
      property="og:description"
      content="Matvey Sizov - Backend Developer / Software Engineer. Distributed systems, high-load services, and cloud reliability."
    />
    <meta property="og:url" content="https://jorqen.github.io/" />
    <meta
      property="og:image"
      content="https://jorqen.github.io/assets/og-cover-recruiter.jpg?v=2"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta
      property="og:image:alt"
      content="Matvey Sizov - Backend Developer / Software Engineer"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Matvey Sizov | Backend Developer / Software Engineer" />
    <meta
      name="twitter:description"
      content="Matvey Sizov - Backend Developer / Software Engineer. Distributed systems, high-load services, and cloud reliability."
    />
    <meta
      name="twitter:image"
      content="https://jorqen.github.io/assets/og-cover-recruiter.jpg?v=2"
    />
    <title>Matvey Sizov | Backend Developer / Software Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/generated/resume-content.js"></script>
    <script defer src="assets/app.js"></script>
  </head>
  <body>
    <header class="site-header container">
      <div class="lang-switch" role="group" aria-label="Language switcher" id="lang-switch">
        <button type="button" data-lang-switch="en">EN</button>
        <button type="button" data-lang-switch="ru">RU</button>
      </div>

      <nav class="site-nav" aria-label="Main navigation">
        <a id="nav-resume" href="#resume"></a>
        <a id="nav-experience" href="#experience"></a>
        <a id="nav-education" href="#education"></a>
        <a id="nav-strengths" href="#strengths"></a>
        <a id="nav-skills" href="#skills"></a>
      </nav>

      <div class="header-controls">
        <div class="theme-switch" role="group" aria-label="Theme switcher" id="theme-switch">
          <button type="button" data-theme-switch="light">
            <img src="assets/icons/light/sun.svg" alt="" aria-hidden="true" />
          </button>
          <button type="button" data-theme-switch="dark">
            <img src="assets/icons/light/moon.svg" alt="" aria-hidden="true" />
          </button>
        </div>
      </div>
    </header>

    <main class="container" id="top">
      <section class="hero reveal">
        <div class="hero-layout">
          <div class="hero-copy">
            <p class="kicker" id="hero-kicker"></p>
            <h1 id="hero-name"></h1>
            <p class="hero-role" id="hero-role"></p>
            <p class="hero-summary" id="hero-summary"></p>

            <div class="hero-links">
              <a id="hero-linkedin" class="action-link" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/jorqen">
                <img src="assets/icons/linkedin.svg" alt="" aria-hidden="true" />
                <span></span>
              </a>
              <a id="hero-github" class="action-link" target="_blank" rel="noopener noreferrer" href="https://github.com/jorqen">
                <img src="assets/icons/light/github.svg" alt="" aria-hidden="true" />
                <span></span>
              </a>
              <a id="hero-telegram" class="action-link" target="_blank" rel="noopener noreferrer" href="https://t.me/jorqen">
                <img src="assets/icons/light/telegram.svg" alt="" aria-hidden="true" />
                <span></span>
              </a>
            </div>

          </div>

          <aside class="hero-visual">
            <figure class="hero-photo-card">
              <img id="hero-photo" class="hero-photo" src="assets/photos/matvey-studio.jpg" alt="" />
              <figcaption id="hero-photo-caption"></figcaption>
            </figure>
          </aside>
        </div>
        <div id="hero-facts" class="facts-grid hero-facts"></div>
      </section>

      <section class="panel reveal" id="resume">
        <div class="panel-header">
          <h2>
            <span class="panel-icon"><img src="assets/icons/light/download.svg" alt="" aria-hidden="true" /></span>
            <span id="resume-title"></span>
          </h2>
          <p id="resume-subtitle"></p>
        </div>
        <div class="resume-actions">
          <a id="resume-pdf" class="resume-button" download>
            <img src="assets/icons/pdf.svg" alt="PDF icon" />
            <div>
              <span class="format">PDF</span>
              <span id="resume-pdf-label" class="label"></span>
            </div>
          </a>
          <a id="resume-docx" class="resume-button" download>
            <img src="assets/icons/docx.svg" alt="DOCX icon" />
            <div>
              <span class="format">DOCX</span>
              <span id="resume-docx-label" class="label"></span>
            </div>
          </a>
          <a id="resume-txt" class="resume-button" download>
            <img src="assets/icons/txt.svg" alt="TXT icon" />
            <div>
              <span class="format">TXT</span>
              <span id="resume-txt-label" class="label"></span>
            </div>
          </a>
        </div>
        <p class="resume-note" id="resume-note"></p>
      </section>

      <section class="panel reveal" id="experience">
        <div class="panel-header">
          <h2>
            <span class="panel-icon"><img src="assets/icons/light/briefcase.svg" alt="" aria-hidden="true" /></span>
            <span id="experience-title"></span>
          </h2>
          <p id="experience-subtitle"></p>
        </div>
        <div class="timeline" id="experience-list"></div>
      </section>

      <section class="panel reveal" id="education">
        <div class="panel-header">
          <h2>
            <span class="panel-icon"><img src="assets/icons/light/education.svg" alt="" aria-hidden="true" /></span>
            <span id="education-title"></span>
          </h2>
          <p id="education-subtitle"></p>
        </div>
        <div class="education-list" id="education-list"></div>
      </section>

      <section class="panel reveal" id="strengths">
        <div class="panel-header">
          <h2>
            <span class="panel-icon"><img src="assets/icons/light/star.svg" alt="" aria-hidden="true" /></span>
            <span id="strengths-title"></span>
          </h2>
          <p id="strengths-subtitle"></p>
        </div>
        <div class="strengths-grid" id="strengths-grid"></div>
      </section>

      <section class="panel reveal" id="skills">
        <div class="panel-header">
          <h2>
            <span class="panel-icon"><img src="assets/icons/light/layers.svg" alt="" aria-hidden="true" /></span>
            <span id="skills-title"></span>
          </h2>
          <p id="skills-subtitle"></p>
        </div>
        <div class="skills-grid" id="skills-grid"></div>
      </section>

      <section class="panel reveal" id="preferences">
        <div class="panel-header">
          <h2>
            <span class="panel-icon"><img src="assets/icons/light/star.svg" alt="" aria-hidden="true" /></span>
            <span id="preferences-title"></span>
          </h2>
        </div>
        <ul class="preferences-list" id="preferences-list"></ul>
      </section>

      <section class="panel reveal" id="photos">
        <div class="panel-header">
          <h2>
            <span class="panel-icon"><img src="assets/icons/light/star.svg" alt="" aria-hidden="true" /></span>
            <span id="photos-title"></span>
          </h2>
          <p id="photos-subtitle"></p>
        </div>
        <div class="gallery-grid" id="gallery-grid"></div>
      </section>

    </main>

    <div class="lightbox" id="photo-lightbox" hidden>
      <button type="button" class="lightbox-backdrop" data-lightbox-close aria-label="Close photo viewer"></button>
      <div class="lightbox-dialog" id="lightbox-dialog" role="dialog" aria-modal="true" aria-labelledby="lightbox-caption" tabindex="-1">
        <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close photo viewer">×</button>
        <button type="button" class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous photo">‹</button>
        <figure class="lightbox-figure">
          <img id="lightbox-image" class="lightbox-image" src="" alt="" />
          <figcaption class="lightbox-meta">
            <p id="lightbox-caption" class="lightbox-caption"></p>
            <p id="lightbox-counter" class="lightbox-counter"></p>
          </figcaption>
        </figure>
        <button type="button" class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next photo">›</button>
      </div>
    </div>

    <footer class="container site-footer">
      <p id="footer-text"></p>
    </footer>
  </body>
</html>
