name: Build And Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "index.html"
      - "assets/**"
      - "resume/data/**"
      - "scripts/build_resume_formats.sh"
      - "scripts/generate_resume_outputs.py"
      - ".github/workflows/build-resumes.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core librsvg2-bin
          python3 -m pip install --user python-docx reportlab pillow pyyaml

      - name: Generate resume files
        run: |
          OUTPUT_ROOT="${GITHUB_WORKSPACE}/dist/resume" \
          ./scripts/build_resume_formats.sh
          mkdir -p dist
          cp index.html dist/
          cp -R assets dist/assets
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
