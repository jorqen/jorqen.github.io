name: Build And Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "index.html"
      - "assets/**"
      - "resume/**/resume.md"
      - "scripts/build_resume_formats.sh"
      - ".github/workflows/build-resumes.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended fonts-dejavu-core

      - name: Generate resume files
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -R assets dist/assets
          OUTPUT_ROOT="${GITHUB_WORKSPACE}/dist/resume" ./scripts/build_resume_formats.sh
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
